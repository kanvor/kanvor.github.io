<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            fetch(file)
            .then(response => response.text())
            .then(text => {
                // Oprava konverzie Obsidian [[text]] odkazov na klikateľné odkazy
                text = text.replace(/\[\[(.*?)\]\]/g, function(match, p1) {
                    return `<a href="?page=${encodeURIComponent(p1)}.md">${p1}</a>`;
                });

                // Vykreslenie Markdownu
                document.getElementById('content').innerHTML = marked.parse(text);

                // Oprava <a> odkazov v Markdown obsahu
                document.querySelectorAll("#content a").forEach(link => {
                    let href = link.getAttribute("href");
                    if (href.endsWith(".md") && !href.includes("?page=")) {
                        link.href = "?page=" + encodeURIComponent(href);
                    }
                });
            })
            .catch(error => console.error("Chyba pri načítaní:", error));
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index.md";

        // Opravené dekódovanie URL
        mdFile = decodeURIComponent(mdFile);

        loadMarkdown(mdFile);
    </script>
</body>
</html>
