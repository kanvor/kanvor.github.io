<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            fetch(file)
            .then(response => response.text())
            .then(text => {
                text = text.replace(/\[\[(.*?)\]\]/g, "[$1]($1.md)");
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => console.error("Chyba pri načítaní:", error));
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        const mdFile = params.get("page") || "index.md";
        loadMarkdown(mdFile);
    </script>

    <nav>
        <a href="?page=index.md">Domov</a> |
        <a href="?page=poznamka.md">Poznámka</a>
    </nav>
</body>
</html>
