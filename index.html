<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            fetch(file)
            .then(response => response.text())
            .then(text => {
                // Oprava pre Obsidian [[text]] odkazy
                text = text.replace(/\[\[(.*?)\]\]/g, function(match, p1) {
                    return `<a href="?page=${encodeURIComponent(p1)}">${p1}</a>`;
                });

                // Vykreslenie Markdown obsahu
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => console.error("Chyba pri načítaní:", error));
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index";
        
        // Pridanie prípony ".md" iba ak tam nie je
        if (!mdFile.endsWith(".md")) {
            mdFile += ".md";
        }

        loadMarkdown(mdFile);
    </script>
</body>
</html>
