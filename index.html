<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Môj Web</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: black; /* Čierne pozadie */
        color: limegreen; /* Zelené písmo */
    }
    #content {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }
    a {
        color: limegreen; /* Zelené odkazy */
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }
    h1, h2, h3, h4, h5, h6 {
        color: limegreen; /* Zelené nadpisy */
    }
</style>
</head>
<body>
    <div id="content">
        <!-- Sem sa vloží konvertovaný Markdown -->
    </div>

    <script>
        // Funkcia na načítanie Markdown súboru
        async function loadMarkdown(file) {
            try {
                const response = await fetch(file);
                const text = await response.text();
                document.getElementById('content').innerHTML = marked.parse(text);
            } catch (error) {
                console.error('Chyba pri načítaní Markdownu:', error);
            }
        }

        // Získaj aktuálnu stránku (napr. "index.md" alebo "about.md")
        const currentPage = window.location.pathname.split('/').pop() || 'index.md';

        // Načítaj Markdown súbor
        loadMarkdown(currentPage);
    </script>
</body>
</html>
