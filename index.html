<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.12/marked.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: black; color: white; padding: 20px; }
        a { color: #00aaff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html?page=index.md">Domov</a>
    </nav>

    <div id="content">Načítavam obsah...</div>

    <script>
        function convertObsidianLinks(text) {
            return text.replace(/\[\[(.*?)\]\]/g, function(match, p1) {
                return `<a href="?page=${encodeURIComponent(p1)}.md">${p1}</a>`;
            });
        }

        function loadMarkdown(file) {
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`${file} sa nepodarilo načítať`);
                    }
                    return response.text();
                })
                .then(text => {
                    text = convertObsidianLinks(text); // Nahradíme Obsidian odkazy
                    document.getElementById("content").innerHTML = marked.parse(text);
                })
                .catch(error => {
                    console.error("Chyba pri načítaní:", error);
                    document.getElementById("content").innerHTML = `<p style="color: red;">Chyba pri načítaní súboru.</p>`;
                });
        }

        // Zistí, ktoré .md načítať podľa URL
        const params = new URLSearchParams(window.location.search);
        const mdFile = params.get("page") || "index.md";
        loadMarkdown(mdFile);
    </script>

</body>
</html>
