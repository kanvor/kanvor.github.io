<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.12/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: black; color: white; padding: 20px; }
        a { color: #00aaff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        #content { background: #111; padding: 10px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <nav>
        <a href="?page=index.md">Domov</a>
    </nav>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            console.log("Načítavam súbor:", file);

            fetch(file, { cache: "no-cache" })  // Vypne cache, aby vždy načítalo aktuálnu verziu
            .then(response => {
                if (!response.ok) throw new Error("HTTP chyba: " + response.status);
                return response.text();
            })
            .then(text => {
                console.log("Úspešne načítané:", text);
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                console.error("Chyba pri načítaní:", error);
                document.getElementById('content').innerHTML = `<pre>❌ Súbor '${file}' sa nepodarilo načítať.</pre>`;
            });
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index.md";

        // Ošetrenie, aby URL neobsahovala duplicitné "?page="
        if (mdFile.includes("?page=")) {
            mdFile = mdFile.split("?page=")[1];
        }

        // Zabezpečenie správnej cesty k súboru
        if (!mdFile.endsWith(".md")) {
            mdFile += ".md";
        }

        loadMarkdown(mdFile);
    </script>
</body>
</html>
