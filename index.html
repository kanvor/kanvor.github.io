<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="content">Načítavam obsah...</div>
    <script>
        function loadMarkdown(file) {
            fetch(file)
            .then(response => response.text())
            .then(text => {
                // Opravená konverzia Obsidian štýlu [[text]] na klikateľné odkazy
                text = text.replace(/\[\[(.*?)\]\]/g, "[$1](?page=" + encodeURIComponent("$1.md") + ")");

                // Vykreslenie Markdownu
                document.getElementById('content').innerHTML = marked.parse(text);

                // Opravená konverzia <a> odkazov (zabránime duplikovaniu ?page=)
                document.querySelectorAll("#content a").forEach(link => {
                    let href = link.getAttribute("href");
                    if (href.endsWith(".md") && !href.includes("?page=")) {
                        link.href = "?page=" + encodeURIComponent(href);
                    }
                });
            })
            .catch(error => console.error("Chyba pri načítaní:", error));
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index.md";

        // Opravené dekódovanie URL, ak bolo už raz enkódované
        mdFile = decodeURIComponent(mdFile);

        loadMarkdown(mdFile);
    </script>
</body>
</html>
