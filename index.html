<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav>
        <a href="?page=index">Domov</a>
    </nav>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            const repo = "kanvor/kanvor.github.io";  // Uprav na správny názov repo
            const branch = "main";  // Alebo "master"
            const rawUrl = `https://raw.githubusercontent.com/${repo}/${branch}/${file}`;

            fetch(rawUrl)
            .then(response => {
                if (!response.ok) throw new Error("Chyba pri načítaní súboru.");
                return response.text();
            })
            .then(text => {
                text = text.replace(/\[\[(.*?)\]\]/g, (_, p1) => `<a href="?page=${encodeURIComponent(p1)}">${p1}</a>`);
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                console.error("Chyba pri načítaní:", error);
                document.getElementById('content').innerHTML = "<p style='color: red;'>Nepodarilo sa načítať obsah.</p>";
            });
        }

        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index";
        if (!mdFile.endsWith(".md")) mdFile += ".md";

        loadMarkdown(mdFile);
    </script>
</body>
</html>
