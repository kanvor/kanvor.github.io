<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <nav>
        <a href="?page=index">Domov</a>
    </nav>
    <div id="content">Načítavam obsah...</div>

    <script>
        function loadMarkdown(file) {
            fetch(file, { headers: { "Accept": "text/plain" } }) // Pokus o obídenie MIME problému
            .then(response => {
                if (!response.ok) {
                    throw new Error("Chyba pri načítaní súboru.");
                }
                return response.text();
            })
            .then(text => {
                // Oprava pre [[text]] odkazy
                text = text.replace(/\[\[(.*?)\]\]/g, function(match, p1) {
                    return `<a href="?page=${encodeURIComponent(p1)}">${p1}</a>`;
                });

                // Vykreslenie Markdown obsahu
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                console.error("Chyba pri načítaní:", error);
                document.getElementById('content').innerHTML = "<p style='color: red;'>Nepodarilo sa načítať obsah.</p>";
            });
        }

        // Skontroluj URL a načítaj správny Markdown súbor
        const params = new URLSearchParams(window.location.search);
        let mdFile = params.get("page") || "index";

        if (!mdFile.endsWith(".md")) {
            mdFile += ".md";
        }

        loadMarkdown(mdFile);
    </script>
</body>
</html>
