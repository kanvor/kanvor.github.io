<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja stránka</title>

    <!-- Web komponent na zobrazenie Markdownu -->
    <script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2/webcomponents-loader.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@1/src/zero-md.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: black; color: white; padding: 20px; }
        a { color: #00aaff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html?page=index.md">Domov</a>
    </nav>

    <!-- Markdown sa zobrazí tu -->
    <zero-md id="markdown-content" src="index.md"></zero-md>

    <script>
        function convertObsidianLinks(text) {
            return text.replace(/\[\[(.*?)\]\]/g, function(match, p1) {
                return `<a href="?page=${encodeURIComponent(p1)}.md">${p1}</a>`;
            });
        }

        function loadMarkdown(file) {
            fetch(file)
                .then(response => response.text())
                .then(text => {
                    document.getElementById("markdown-content").innerHTML = convertObsidianLinks(text);
                })
                .catch(error => console.error("Chyba pri načítaní:", error));
        }

        const params = new URLSearchParams(window.location.search);
        const mdFile = params.get("page") || "index.md";
        loadMarkdown(mdFile);
    </script>
</body>
</html>
