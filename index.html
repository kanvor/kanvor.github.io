<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanvor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.12/marked.min.js"></script>
</head>
<body>
    <div id="content">Loading...</div>

    <script>
        function loadMarkdown(file) {
            fetch(file)
            .then(response => response.text())
            .then(text => {
                // Nahradí wikilinky [[xyz]] → [xyz](xyz.md)
                text = text.replace(/\[\[(.*?)\]\]/g, '[$1]($1.md)');
                document.getElementById('content').innerHTML = marked.parse(text);
            });
        }

        // Načíta hlavný súbor index.md
        loadMarkdown('index.md');

        // Dynamické spracovanie všetkých odkazov na .md
        document.addEventListener("click", function(e) {
            if (e.target.tagName === "A" && e.target.href.endsWith(".md")) {
                e.preventDefault();
                loadMarkdown(e.target.getAttribute("href"));
            }
        });
    </script>
</body>
</html>
